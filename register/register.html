<!doctype html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="register.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- PAGE -->
    <main class="login-page">
      <div class="login-layout">
        <section class="login-card">
          <header class="login-card__header">
            <h1 class="login-card__title">Sign Up</h1>
            <p class="login-card__subtitle">
              Welcome to the cybersecurity course.
            </p>
          </header>

          <form class="login-form" action="#" method="post">
            <div class="social-auth">
              <button class="social-auth__btn" type="button">
                <span class="social-auth__icon">
                  <img src="../img/google.png" alt="" />
                </span>
                Continue with Google
              </button>

              <button class="social-auth__btn" type="button">
                <span class="social-auth__icon">
                  <img src="../img/linkedin.png" alt="" />
                </span>
                Continue with LinkedIn
              </button>

              <button class="social-auth__btn" type="button">
                <span class="social-auth__icon">
                  <img src="../img/key.png" alt="" />
                </span>
                Continue with SSO
              </button>
            </div>

            <div class="login-divider">
              <span class="login-divider__line"></span>
              <span class="login-divider__text">Or</span>
              <span class="login-divider__line"></span>
            </div>

            <label class="form-field">
              <span class="form-field__label">Username or email</span>
              <input
                class="form-field__input"
                type="email"
                name="email"
                placeholder="example@example.com"
                autocomplete="email"
              />
            </label>

            <button
              class="login-submit"
              type="submit"
              href="../register/register_1.html"
            >
              Sign up
            </button>

            <div class="login-help">
              <span class="login-help__text">Having trouble logging in?</span>
              <a class="login-help__link" href="#">Send magic link</a>
            </div>

            <footer class="login-footer">
              <span>You have an account?</span>
              <a class="login-footer__link" href="../Login/login.html">Login</a
              >.
            </footer>
          </form>
        </section>
      </div>
    </main>
    <!-- PAGE-END -->

    <script>
      fetch("../navbar_guest.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>
  </body>
</html>
