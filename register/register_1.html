<!doctype html>
<html lang="vi">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../Login/login.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div id="navbar"></div>

    <!-- PAGE -->
    <main class="login-page">
      <div class="login-layout">
        <section class="login-card">
          <header class="login-card__header">
            <h1 class="login-card__title">Sign Up</h1>
            <p class="login-card__subtitle">Join over 7+ million others learning cyber security.</p>
            
          </header>

            <form class="login-form" action="#" method="post">
            <label class="form-field">
              <span class="form-field__label">Username or email</span>
              <input
                class="form-field__input"
                type="email"
                name="email"
                placeholder="example@example.com"
                autocomplete="email"
              />
            </label>

            <label class="form-field">
              <span class="form-field__label">Password</span>

              <div class="form-field__password">
                <input
                  class="form-field__input"
                  type="password"
                  name="password"
                  placeholder="Password"
                  autocomplete="current-password"
                />
                <button
                  class="form-field__toggle"
                  type="button"
                  aria-label="Show password"
                >
                  <img src="../img/eye-password.png" alt="" />
                </button>
              </div>
              <a class="login-card__link" href="#">Forgot password?</a>

            </label>

            <!-- reCAPTCHA mock (demo UI) -->
            <div class="recaptcha">
              <div class="recaptcha__box">
                <div class="recaptcha__left">
                  <div class="recaptcha__checkbox" aria-hidden="true"></div>
                  <span class="recaptcha__text"
                    >Tôi không phải là người máy</span
                  >
                </div>

                <div class="recaptcha__right">
                  <div class="recaptcha__logo" aria-hidden="true"></div>
                  <span class="recaptcha__brand">reCAPTCHA</span>
                </div>
              </div>

              <div class="recaptcha__meta">
                <a href="#" class="recaptcha__meta-link">Bảo mật</a>
                <span class="recaptcha__meta-dot">-</span>
                <a href="#" class="recaptcha__meta-link">Điều khoản</a>
              </div>
            </div>

            <button class="login-submit" type="submit" href="../dashboard/dashboard.html">Sign up</button>

            <div class="login-help">
              <span class="login-help__text">Having trouble logging in?</span>
              <a class="login-help__link" href="#">Send magic link</a>
            </div>

            <footer class="login-footer">
              <span>You have an account?</span>
              <a class="login-footer__link" href="../Login/login.html">Login</a>.
            </footer>
          </form>
        </section>
      </div>
    </main>
    <!-- PAGE-END -->

    <script>
  fetch("../navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
    </script>

  </body>
</html>
